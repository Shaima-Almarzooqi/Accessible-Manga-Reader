name: Build and release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python run_tests.py

      # wx loads WebView2Loader.dll at runtime, so PyInstaller's wx hook
      # does not pick it up; without it the HTML view silently falls back
      # to the legacy IE engine.
      - name: Locate WebView2Loader.dll
        run: |
          $dll = python -c "import wx, os; print(os.path.join(os.path.dirname(wx.__file__), 'WebView2Loader.dll'))"
          if (-not (Test-Path $dll)) {
            Write-Host "WebView2Loader.dll not found. wx package directory contains:"
            Get-ChildItem (Split-Path $dll)
            exit 1
          }
          "WEBVIEW2_DLL=$dll" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build single executable
        run: >
          pyinstaller --onefile --windowed --clean
          --name AccessibleMangaReader-${{ matrix.arch }}
          --add-binary "${{ env.WEBVIEW2_DLL }};wx"
          main.py

      - uses: actions/upload-artifact@v4
        with:
          name: AccessibleMangaReader-${{ matrix.arch }}
          path: dist/AccessibleMangaReader-${{ matrix.arch }}.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: artifacts/**/*.exe
